# Example: How to use the reusable AI PR review workflow
#
# To use this workflow in your repository:
# 1. Copy this file to your repository's .github/workflows/ directory
# 2. Update the 'uses:' path to point to the correct repository and branch/tag
# 3. Configure the inputs and secrets for your OpenAI setup
# 4. Add the OPENAI_API_KEY secret to your repository settings

name: AI PR Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.issue.number }}${{ github.event_name == 'issue_comment' && !startsWith(github.event.comment.body, '/review') && '-noop' || '' }}
  cancel-in-progress: true

jobs:
  review:
    uses: oxidian/actions/gh/ai-pr-review.yml@main
    with:
      # Required: Your OpenAI API endpoint
      responses-api-endpoint: "https://your-azure-openai.openai.azure.com/openai/v1/responses"

      # Required: The model to use for reviews
      model: "gpt-5.2-codex"

      # Optional: Effort level (low, medium, high, xhigh)
      effort: "xhigh"

      # Optional: Maximum minutes to wait for CI checks (default: 30)
      ci-timeout-minutes: 30
    secrets:
      # Required: Your OpenAI API key (add this to your repository secrets)
      openai-api-key: ${{ secrets.OPENAI_API_KEY }}
