name: AI PR Review

on:
  workflow_call:
    inputs:
      responses-api-endpoint:
        description: OpenAI API endpoint URL
        required: true
        type: string
      model:
        description: OpenAI model to use
        required: false
        type: string
        default: gpt-5.4
      effort:
        description: Effort level for the review (low, medium, high, xhigh)
        required: false
        type: string
        default: xhigh
      ci-timeout-minutes:
        description: Maximum minutes to wait for CI checks to pass
        required: false
        type: number
        default: 30
      max-retries:
        description: Max retries for Codex API requests and streaming connections
        required: false
        type: number
        default: 10
    secrets:
      openai-api-key:
        description: OpenAI API key
        required: true

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.issue.number }}${{ github.event_name == 'issue_comment' && !startsWith(github.event.comment.body, '/review') && '-noop' || '' }}
  cancel-in-progress: true

# Trigger on PR events from the caller workflow
permissions:
  checks: read
  contents: read
  pull-requests: write

jobs:
  # Quick check to determine if we should run the review
  should-review:
    # Run if:
    # - PR event, not a draft, and not from dependabot, OR
    # - Comment on a PR starting with /review (manual override works for any PR)
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/review'))
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run == 'true' && steps.permissions.outputs.has_access == 'true' }}
    steps:
      - name: Check actor permissions
        id: permissions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          PERMISSION=$(gh api "repos/${{ github.repository }}/collaborators/$ACTOR/permission" \
            --jq '.permission')

          echo "User $ACTOR has permission: $PERMISSION"

          if [[ "$PERMISSION" == "admin" || "$PERMISSION" == "write" ]]; then
            echo "has_access=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::User $ACTOR does not have write access (permission: $PERMISSION)."
            echo "has_access=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Check if review should run
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          # Skip if auto-merge is enabled (user doesn't want review)
          AUTO_MERGE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json autoMergeRequest -q '.autoMergeRequest != null')
          if [[ "$AUTO_MERGE" == "true" ]]; then
            echo "Auto-merge is enabled, skipping AI review"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For non-synchronize events, always run
          if [[ "$EVENT_ACTION" != "synchronize" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Non-synchronize event, will run review"
            exit 0
          fi

          # For synchronize events, only run if:
          # 1. A review was already in progress (restart cancelled reviews), OR
          # 2. CI previously failed (now might pass after the push)
          COMMENT=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json comments \
            -q '([.comments[] | select(.body | contains("AI Code Review"))] | last | .body) // ""')

          if [[ "$COMMENT" == *"<!-- AI_REVIEW_STATE: in_progress -->"* ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Review was in progress, will restart"
          elif [[ "$COMMENT" == *"<!-- AI_REVIEW_STATE: ci_failed -->"* ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "CI previously failed, will retry now that new commits are pushed"
          elif [[ "$COMMENT" == *"<!-- AI_REVIEW_STATE: error -->"* ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Review previously errored, will retry"
          elif [[ -z "$COMMENT" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "No previous review comment found, will start review"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Previous review completed, skipping"
          fi

  review:
    needs: should-review
    if: needs.should-review.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # React to /review comment so the user knows we saw it
      - name: Acknowledge /review command
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='eyes' --silent

      # Wait for CI checks to pass before running review (skip for manual /review)
      - name: Wait for CI checks
        id: ci_check
        if: github.event_name != 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CI_TIMEOUT_MINUTES: ${{ inputs.ci-timeout-minutes }}
        run: |
          echo "Waiting for CI checks to complete..."
          MAX_ATTEMPTS=$((CI_TIMEOUT_MINUTES * 2))  # 30s intervals
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            # Get all check runs for this commit, excluding our own workflow
            # Filter out any check from the AI PR Review workflow
            CHECKS=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
              --jq '[.check_runs[] | select((.name | contains("AI PR Review") | not) and (.name | contains("review / review") | not) and .name != "review" and .name != "should-review")]')

            TOTAL=$(echo "$CHECKS" | jq 'length')
            COMPLETED=$(echo "$CHECKS" | jq '[.[] | select(.status == "completed")] | length')
            FAILED=$(echo "$CHECKS" | jq '[.[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")] | length')

            echo "Check status: $COMPLETED/$TOTAL completed"

            if [ "$FAILED" -gt 0 ]; then
              echo "CI checks failed. Skipping AI review."
              echo "$CHECKS" | jq -r '.[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral") | "  - \(.name): \(.conclusion)"'
              echo "ci_passed=false" >> "$GITHUB_OUTPUT"

              # Capture failed checks for the comment
              FAILED_CHECKS=$(echo "$CHECKS" | jq -r '[.[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral") | "- **\(.name)**: \(.conclusion)"] | join("\n")')
              {
                echo "failed_checks<<EOF"
                echo "$FAILED_CHECKS"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$COMPLETED" -eq "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
              echo "All CI checks passed!"
              echo "ci_passed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 30
          done

          echo "Timeout waiting for CI checks"
          echo "ci_passed=false" >> "$GITHUB_OUTPUT"
          echo "failed_checks=CI check timeout" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post CI failure comment
        if: github.event_name != 'issue_comment' && steps.ci_check.outputs.ci_passed == 'false'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3.0.4
        with:
          header: AI Review
          number: ${{ github.event.pull_request.number || github.event.issue.number }}
          message: |
            ## AI Code Review

            :warning: **CI checks failed - review skipped**

            Please fix the failing CI checks before the AI review can run:

            ${{ steps.ci_check.outputs.failed_checks }}

            Pushing new commits will trigger the review automatically once CI passes.

            ---
            *Triggered by: PR opened/ready*
            <!-- AI_REVIEW_STATE: ci_failed -->

      # For issue_comment events, checkout the PR branch
      - name: Checkout PR branch (comment trigger)
        if: github.event_name == 'issue_comment'
        run: gh pr checkout ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Extract custom instructions from /review command
      - name: Parse review command
        if: github.event_name == 'issue_comment' || steps.ci_check.outputs.ci_passed == 'true'
        id: parse
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            # Extract everything after "/review " (if present)
            CUSTOM_INSTRUCTIONS="${COMMENT_BODY#/review}"
            CUSTOM_INSTRUCTIONS="${CUSTOM_INSTRUCTIONS# }"  # Trim leading space
          else
            CUSTOM_INSTRUCTIONS=""
          fi
          {
            echo "custom_instructions<<EOF"
            echo "$CUSTOM_INSTRUCTIONS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Post "in progress" comment before starting the review
      - name: Post started comment
        if: github.event_name == 'issue_comment' || steps.ci_check.outputs.ci_passed == 'true'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3.0.4
        with:
          header: AI Review
          number: ${{ github.event.pull_request.number || github.event.issue.number }}
          message: |
            ## AI Code Review

            :hourglass_flowing_sand: **Review in progress...**

            ---
            *Triggered by: ${{ github.event_name == 'issue_comment' && 'manual /review command' || 'PR opened/ready' }}*
            <!-- AI_REVIEW_STATE: in_progress -->

      # Run the composite action for the actual review
      - name: Run AI review
        if: github.event_name == 'issue_comment' || steps.ci_check.outputs.ci_passed == 'true'
        id: ai_review
        uses: oxidian/actions/ai-review@main
        with:
          openai-api-key: ${{ secrets.openai-api-key }}
          responses-api-endpoint: ${{ inputs.responses-api-endpoint }}
          model: ${{ inputs.model }}
          effort: ${{ inputs.effort }}
          pr-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          max-retries: ${{ inputs.max-retries }}
          custom-instructions: ${{ steps.parse.outputs.custom_instructions }}

      # Post success comment
      - name: Post review comment
        if: github.event_name == 'issue_comment' || steps.ci_check.outputs.ci_passed == 'true'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3.0.4
        with:
          header: AI Review
          number: ${{ github.event.pull_request.number || github.event.issue.number }}
          message: |
            ## AI Code Review

            ${{ steps.ai_review.outputs.review }}

            ---
            *Triggered by: ${{ github.event_name == 'issue_comment' && 'manual /review command' || 'PR opened/ready' }}*
            <!-- AI_REVIEW_STATE: completed -->

      # Post failure comment (only runs if any previous step failed)
      - name: Post failure comment
        if: failure() && (github.event_name == 'issue_comment' || steps.ci_check.outputs.ci_passed == 'true')
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3.0.4
        with:
          header: AI Review
          number: ${{ github.event.pull_request.number || github.event.issue.number }}
          message: |-
            ## AI Code Review

            :x: **Review failed**

            The AI review encountered an error. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            ---
            *Triggered by: ${{ github.event_name == 'issue_comment' && 'manual /review command' || 'PR opened/ready' }}*
            <!-- AI_REVIEW_STATE: error -->
