name: AI PR Review (Reusable)

on:
  workflow_call:
    inputs:
      responses-api-endpoint:
        description: 'OpenAI API endpoint URL'
        required: true
        type: string
      model:
        description: 'OpenAI model to use (e.g., gpt-5.2-codex)'
        required: true
        type: string
      effort:
        description: 'Effort level for the review (low, medium, high, xhigh)'
        required: false
        type: string
        default: 'xhigh'
      ci-timeout-minutes:
        description: 'Maximum minutes to wait for CI checks to pass'
        required: false
        type: number
        default: 30
    secrets:
      openai-api-key:
        description: 'OpenAI API key'
        required: true

# Trigger on PR events from the caller workflow
permissions:
  checks: read
  contents: read
  pull-requests: write

jobs:
  # Quick check to determine if we should run the review
  should-review:
    # Run if:
    # - PR event, not a draft, and not from dependabot, OR
    # - Comment on a PR starting with /review (manual override works for any PR)
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/review'))
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if review should run
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          # Skip if auto-merge is enabled (user doesn't want review)
          AUTO_MERGE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json autoMergeRequest -q '.autoMergeRequest != null')
          if [[ "$AUTO_MERGE" == "true" ]]; then
            echo "Auto-merge is enabled, skipping AI review"
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # For non-synchronize events, always run
          if [[ "$EVENT_ACTION" != "synchronize" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Non-synchronize event, will run review"
            exit 0
          fi

          # For synchronize events, only run if:
          # 1. A review was already in progress (restart cancelled reviews), OR
          # 2. CI previously failed (now might pass after the push)
          COMMENT=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json comments \
            -q '([.comments[] | select(.body | contains("AI Code Review"))] | last | .body) // ""')

          if [[ "$COMMENT" == *"<!-- AI_REVIEW_STATE: in_progress -->"* ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Review was in progress, will restart"
          elif [[ "$COMMENT" == *"<!-- AI_REVIEW_STATE: ci_failed -->"* ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "CI previously failed, will retry now that new commits are pushed"
          elif [[ -z "$COMMENT" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "No previous review comment found, will start review"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Previous review completed, skipping"
          fi

  review:
    needs: should-review
    if: needs.should-review.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Post "started" comment immediately
      - name: Post started comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: AI Review
          number: ${{ github.event.pull_request.number || github.event.issue.number }}
          message: |
            ## AI Code Review

            :hourglass_flowing_sand: **Review in progress...**

            ---
            *Triggered by: ${{ github.event_name == 'issue_comment' && 'manual /review command' || 'PR opened/ready' }}*
            <!-- AI_REVIEW_STATE: in_progress -->

      # Wait for CI checks to pass before running review (skip for manual /review)
      - name: Wait for CI checks
        id: ci_check
        if: github.event_name != 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CI_TIMEOUT_MINUTES: ${{ inputs.ci-timeout-minutes }}
        run: |
          echo "Waiting for CI checks to complete..."
          MAX_ATTEMPTS=$((CI_TIMEOUT_MINUTES * 2))  # 30s intervals
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            # Get all check runs for this commit, excluding our own workflow
            CHECKS=$(gh api repos/${{ github.repository }}/commits/$SHA/check-runs \
              --jq '[.check_runs[] | select(.name != "review" and .name != "should-review")]')

            TOTAL=$(echo "$CHECKS" | jq 'length')
            COMPLETED=$(echo "$CHECKS" | jq '[.[] | select(.status == "completed")] | length')
            FAILED=$(echo "$CHECKS" | jq '[.[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")] | length')

            echo "Check status: $COMPLETED/$TOTAL completed"

            if [ "$FAILED" -gt 0 ]; then
              echo "CI checks failed. Skipping AI review."
              echo "$CHECKS" | jq -r '.[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral") | "  - \(.name): \(.conclusion)"'
              echo "ci_passed=false" >> $GITHUB_OUTPUT

              # Capture failed checks for the comment
              FAILED_CHECKS=$(echo "$CHECKS" | jq -r '[.[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral") | "- **\(.name)**: \(.conclusion)"] | join("\n")')
              echo "failed_checks<<EOF" >> $GITHUB_OUTPUT
              echo "$FAILED_CHECKS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              exit 0
            fi

            if [ "$COMPLETED" -eq "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
              echo "All CI checks passed!"
              echo "ci_passed=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 30
          done

          echo "Timeout waiting for CI checks"
          echo "ci_passed=false" >> $GITHUB_OUTPUT
          echo "failed_checks=CI check timeout" >> $GITHUB_OUTPUT
          exit 0

      - name: Post CI failure comment
        if: github.event_name != 'issue_comment' && steps.ci_check.outputs.ci_passed == 'false'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: AI Review
          number: ${{ github.event.pull_request.number || github.event.issue.number }}
          message: |
            ## AI Code Review

            :warning: **CI checks failed - review skipped**

            Please fix the failing CI checks before the AI review can run:

            ${{ steps.ci_check.outputs.failed_checks }}

            Once CI passes, push a new commit to trigger the review automatically.

            ---
            *Triggered by: PR opened/ready*
            <!-- AI_REVIEW_STATE: ci_failed -->

      # For issue_comment events, checkout the PR branch
      - name: Checkout PR branch (comment trigger)
        if: github.event_name == 'issue_comment'
        run: gh pr checkout ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Get PR metadata for accurate diff
      - name: Get PR metadata
        if: github.event_name == 'issue_comment' || steps.ci_check.outputs.ci_passed == 'true'
        id: pr_meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          # Get PR details (title, body, base branch name, head SHA)
          PR_DATA=$(gh pr view "$PR_NUMBER" --json baseRefName,headRefOid,title,body)

          BASE_REF=$(echo "$PR_DATA" | jq -r '.baseRefName')
          HEAD_SHA=$(echo "$PR_DATA" | jq -r '.headRefOid')
          TITLE=$(echo "$PR_DATA" | jq -r '.title')
          BODY=$(echo "$PR_DATA" | jq -r '.body // ""')

          # Compute merge-base to avoid including unrelated changes when base branch advances
          BASE_SHA=$(git merge-base origin/$BASE_REF $HEAD_SHA)

          # Get all changed files with pagination (gh pr view --json files doesn't paginate)
          CHANGED_FILES=$(gh api --paginate "repos/${{ github.repository }}/pulls/$PR_NUMBER/files" \
            --jq '.[] | "\(.filename) (+\(.additions)/-\(.deletions))"')

          echo "base_sha=$BASE_SHA" >> $GITHUB_OUTPUT
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT

          echo "title<<EOF" >> $GITHUB_OUTPUT
          echo "$TITLE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Extract custom instructions from /review command
      - name: Parse review command
        if: github.event_name == 'issue_comment' || steps.ci_check.outputs.ci_passed == 'true'
        id: parse
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            # Extract everything after "/review " (if present)
            CUSTOM_INSTRUCTIONS="${COMMENT_BODY#/review}"
            CUSTOM_INSTRUCTIONS="${CUSTOM_INSTRUCTIONS# }"  # Trim leading space
          else
            CUSTOM_INSTRUCTIONS=""
          fi
          echo "custom_instructions<<EOF" >> $GITHUB_OUTPUT
          echo "$CUSTOM_INSTRUCTIONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Codex Review
        if: github.event_name == 'issue_comment' || steps.ci_check.outputs.ci_passed == 'true'
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.openai-api-key }}
          responses-api-endpoint: ${{ inputs.responses-api-endpoint }}
          model: ${{ inputs.model }}
          effort: ${{ inputs.effort }}
          prompt: |
            You are acting as a reviewer for a proposed code change (pull request) made by another engineer. You are reviewing the PR diff between the commits specified below. Only review the files listed below - these are the only files changed in this PR.

            ## PR Context

            **Title:** ${{ steps.pr_meta.outputs.title }}

            **Description:**
            ${{ steps.pr_meta.outputs.body }}

            **Changed files (with additions/deletions):**
            ${{ steps.pr_meta.outputs.changed_files }}

            **How to view the diff:**
            git diff ${{ steps.pr_meta.outputs.base_sha }} ${{ steps.pr_meta.outputs.head_sha }}

            Or for a specific file:
            git diff ${{ steps.pr_meta.outputs.base_sha }} ${{ steps.pr_meta.outputs.head_sha }} -- <filepath>

            IMPORTANT: Only review changes between these exact commits. Do not use other git commands to determine the diff - the base commit above is the correct merge base for this PR.

            Below are guidelines for determining whether the original author would appreciate an issue being flagged. These are defaults - any more specific guidelines in AGENTS.md or the codebase override these.

            ## Guidelines for Determining Whether Something is a Bug

            1. It meaningfully impacts the accuracy, performance, security, or maintainability of the code.
            2. The bug is discrete and actionable (i.e. not a general issue with the codebase or a combination of multiple issues).
            3. Fixing the bug does not demand a level of rigor that is not present in the rest of the codebase (e.g. one doesn't need very detailed comments and input validation in a repository of one-off scripts in personal projects).
            4. The bug was introduced in this PR (pre-existing bugs should not be flagged).
            5. The author of the original PR would likely fix the issue if they were made aware of it.
            6. The bug does not rely on unstated assumptions about the codebase or author's intent.
            7. It is not enough to speculate that a change may disrupt another part of the codebase; to be considered a bug, one must identify the other parts of the code that are provably affected.
            8. The bug is clearly not just an intentional change by the original author.

            ## Security Issues

            Security vulnerabilities should be treated with elevated priority:
            - SQL injection, command injection, XSS, CSRF, and other OWASP Top 10 vulnerabilities are P0 or P1
            - Exposed secrets, credentials, or API keys in code are P0
            - Insufficient input validation at system boundaries (user input, external APIs) should be flagged
            - Authentication/authorization bypasses are P0

            ## Test Coverage

            - If the PR introduces new functionality without corresponding tests, and the codebase has an established testing pattern, this may be flagged as P2 or P3
            - If the PR fixes a bug without a regression test, mention this if the codebase uses TDD
            - Do not flag missing tests for trivial changes or when the codebase has no testing convention

            ## Guidelines for Writing Comments

            When flagging a bug, provide an accompanying comment following these rules:

            1. The comment should be clear about why the issue is a bug.
            2. The comment should appropriately communicate the severity of the issue. It should not claim that an issue is more severe than it actually is.
            3. The comment should be brief. The body should be at most 1 paragraph. It should not introduce line breaks within the natural language flow unless necessary for a code fragment.
            4. The comment should not include any chunks of code longer than 3 lines. Any code chunks should be wrapped in markdown inline code tags or a code block.
            5. The comment should clearly and explicitly communicate the scenarios, environments, or inputs that are necessary for the bug to arise. The comment should immediately indicate that the issue's severity depends on these factors.
            6. The comment's tone should be matter-of-fact and not accusatory or overly positive. It should read as a helpful AI assistant suggestion without sounding too much like a human reviewer.
            7. The comment should be written such that the original author can immediately grasp the idea without close reading.
            8. The comment should avoid excessive flattery and comments that are not helpful to the original author. Avoid phrasing like "Great job ...", "Thanks for ...".

            ## How Many Findings to Return

            Output all findings that the original author would fix if they knew about it. If there is no finding that a person would definitely love to see and fix, prefer outputting no findings. Do not stop at the first qualifying finding. Continue until you've listed every qualifying finding.

            ## Additional Guidelines

            - Ignore trivial style unless it obscures meaning or violates documented standards.
            - Use one comment per distinct issue.
            - Keep line ranges as short as possible for interpreting the issue. Avoid ranges longer than 5-10 lines; choose the most suitable subrange that pinpoints the problem.
            - Do NOT flag: minor formatting, personal style preferences, "could also be done this way" suggestions, pre-existing issues not introduced by this PR.

            ## Priority Levels

            At the beginning of each finding title, tag with a priority level:

            - [P0] – Drop everything to fix. Blocking release, operations, or major usage. Security vulnerabilities, data loss risks, complete feature breakage. Only use for universal issues that do not depend on any assumptions about the inputs.
            - [P1] – Urgent. Should be addressed in the next cycle. Bugs that affect functionality, performance regressions, security weaknesses.
            - [P2] – Normal. To be fixed eventually. Minor bugs, edge cases, missing error handling.
            - [P3] – Low. Nice to have. Code quality improvements, missing tests, documentation.

            ${{ steps.parse.outputs.custom_instructions != '' && format('## Additional Reviewer Instructions\n\n{0}', steps.parse.outputs.custom_instructions) || '' }}

            ## Output Format

            Output valid JSON matching this schema exactly. Do NOT wrap the JSON in markdown fences or extra prose.

            {
              "findings": [
                {
                  "title": "<≤80 chars, imperative, starts with [P0-P3]>",
                  "body": "<valid Markdown explaining *why* this is a problem; cite files/lines/functions>",
                  "confidence_score": <float 0.0-1.0>,
                  "priority": <int 0-3>,
                  "code_location": {
                    "file_path": "<path relative to repository root, e.g. backend/app/main.py>",
                    "line_range": {"start": <int>, "end": <int>}
                  }
                }
              ],
              "overall_correctness": "patch is correct" | "patch is incorrect",
              "overall_explanation": "<1-3 sentence explanation justifying the verdict. If incorrect, summarize the blocking issues.>",
              "overall_confidence_score": <float 0.0-1.0>
            }

            Notes:
            - The code_location field is required and must include file_path and line_range.
            - Line ranges should overlap with the diff.
            - "overall_correctness" is "patch is correct" if existing code and tests will not break and the patch is free of P0/P1 bugs. Ignore non-blocking issues (style, formatting, typos, documentation, P2/P3 findings).
            - If there are no findings, return an empty findings array.

      - name: Parse review output
        if: github.event_name == 'issue_comment' || steps.ci_check.outputs.ci_passed == 'true'
        id: parse_review
        env:
          CODEX_OUTPUT: ${{ steps.codex.outputs.final-message }}
        run: |
          OUTPUT="$CODEX_OUTPUT"

          # Try to extract JSON from output
          if echo "$OUTPUT" | jq -e . >/dev/null 2>&1; then
            FINDINGS=$(echo "$OUTPUT" | jq -r '.findings // []')
            CORRECTNESS=$(echo "$OUTPUT" | jq -r '.overall_correctness // "unknown"')
            EXPLANATION=$(echo "$OUTPUT" | jq -r '.overall_explanation // ""')
            CONFIDENCE=$(echo "$OUTPUT" | jq -r '.overall_confidence_score // 0')
            echo "json_valid=true" >> $GITHUB_OUTPUT
          else
            echo "json_valid=false" >> $GITHUB_OUTPUT
            FINDINGS="[]"
            CORRECTNESS="unknown"
            EXPLANATION=""
            CONFIDENCE="0"
          fi

          # Use heredocs for multiline outputs
          echo "findings<<EOF" >> $GITHUB_OUTPUT
          echo "$FINDINGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "correctness=$CORRECTNESS" >> $GITHUB_OUTPUT
          echo "explanation<<EOF" >> $GITHUB_OUTPUT
          echo "$EXPLANATION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "confidence=$CONFIDENCE" >> $GITHUB_OUTPUT

      - name: Format review comment
        if: github.event_name == 'issue_comment' || steps.ci_check.outputs.ci_passed == 'true'
        id: format_comment
        env:
          JSON_VALID: ${{ steps.parse_review.outputs.json_valid }}
          CORRECTNESS: ${{ steps.parse_review.outputs.correctness }}
          EXPLANATION: ${{ steps.parse_review.outputs.explanation }}
          CONFIDENCE: ${{ steps.parse_review.outputs.confidence }}
          FINDINGS: ${{ steps.parse_review.outputs.findings }}
          CODEX_OUTPUT: ${{ steps.codex.outputs.final-message }}
          BRANCH_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          if [[ "$JSON_VALID" != "true" ]]; then
            # Fallback to raw output if JSON parsing failed
            COMMENT="⚠️ **Could not parse structured review output**

          Raw review output:

          $CODEX_OUTPUT"
          else
            # Build verdict header
            if [[ "$CORRECTNESS" == "patch is correct" ]]; then
              VERDICT="✅ **Patch is correct**"
            elif [[ "$CORRECTNESS" == "patch is incorrect" ]]; then
              VERDICT="❌ **Patch is incorrect**"
            else
              VERDICT="❓ **Verdict unknown**"
            fi

            # Start building comment
            COMMENT="$VERDICT (confidence: ${CONFIDENCE})

          $EXPLANATION"

            # Add findings if any
            FINDING_COUNT=$(echo "$FINDINGS" | jq 'length')
            if [[ "$FINDING_COUNT" -gt 0 ]]; then
              COMMENT="$COMMENT

          ### Findings ($FINDING_COUNT)

          "
              # Sort findings by priority and format each one
              SORTED_FINDINGS=$(echo "$FINDINGS" | jq -c 'sort_by(.priority)[]')
              while IFS= read -r finding; do
                TITLE=$(echo "$finding" | jq -r '.title')
                BODY=$(echo "$finding" | jq -r '.body')
                FILE=$(echo "$finding" | jq -r '.code_location.file_path')
                START_LINE=$(echo "$finding" | jq -r '.code_location.line_range.start')
                END_LINE=$(echo "$finding" | jq -r '.code_location.line_range.end')
                CONF=$(echo "$finding" | jq -r '.confidence_score')

                # Strip workspace prefix if LLM returned absolute path (fallback)
                FILE="${FILE#$GITHUB_WORKSPACE/}"

                # Create file link (GitHub format)
                FILE_LINK="[\`$FILE:$START_LINE-$END_LINE\`](../blob/$BRANCH_REF/$FILE#L$START_LINE-L$END_LINE)"

                COMMENT="$COMMENT
          #### $TITLE

          📍 $FILE_LINK | Confidence: $CONF

          $BODY

          "
              done <<< "$SORTED_FINDINGS"
            else
              COMMENT="$COMMENT

          ### No issues found

          The review did not identify any bugs or concerns with this change."
            fi
          fi

          # Output using heredoc
          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Post success comment (only runs if all previous steps succeeded)
      - name: Post success comment
        if: github.event_name == 'issue_comment' || steps.ci_check.outputs.ci_passed == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: AI Review
          number: ${{ github.event.pull_request.number || github.event.issue.number }}
          message: |
            ## AI Code Review

            ${{ steps.format_comment.outputs.comment }}

            ---
            *Triggered by: ${{ github.event_name == 'issue_comment' && 'manual /review command' || 'PR opened/ready' }}*
            <!-- AI_REVIEW_STATE: completed -->

      # Post failure comment (only runs if any previous step failed)
      - name: Post failure comment
        if: failure() && (github.event_name == 'issue_comment' || steps.ci_check.outputs.ci_passed == 'true')
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: AI Review
          number: ${{ github.event.pull_request.number || github.event.issue.number }}
          message: |
            ## AI Code Review

            :x: **Review failed**

            The AI review encountered an error. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            ---
            *Triggered by: ${{ github.event_name == 'issue_comment' && 'manual /review command' || 'PR opened/ready' }}*
            <!-- AI_REVIEW_STATE: error -->
