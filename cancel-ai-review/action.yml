name: Cancel AI Review
description: >
  Composite action that cancels and deletes AI review workflow runs for a given
  PR. Use this when auto-merge is enabled and you want to stop pending reviews.

inputs:
  pr-number:
    description: PR number to cancel reviews for
    required: true
  workflow-name:
    description: Name of the AI review workflow file
    required: false
    default: ai-review.yml

outputs:
  cancelled-count:
    description: Number of workflow runs cancelled
    value: ${{ steps.cancel.outputs.cancelled_count }}

runs:
  using: composite
  steps:
    - name: Cancel and delete AI review runs
      id: cancel
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ inputs.pr-number }}
        WORKFLOW_NAME: ${{ inputs.workflow-name }}
      run: |-
        echo "Looking for AI review workflow runs for PR #$PR_NUMBER..."

        # Get workflow runs for this PR
        RUNS=$(gh api "repos/${{ github.repository }}/actions/workflows/$WORKFLOW_NAME/runs" \
          --jq "[.workflow_runs[] | select(.pull_requests[].number == $PR_NUMBER)]")

        RUN_COUNT=$(echo "$RUNS" | jq 'length')
        echo "Found $RUN_COUNT workflow run(s) for PR #$PR_NUMBER"

        if [ "$RUN_COUNT" -eq 0 ]; then
          echo "cancelled_count=0" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Cancel any in-progress runs
        CANCELLED=0
        for RUN_ID in $(echo "$RUNS" | jq -r '.[].id'); do
          STATUS=$(echo "$RUNS" | jq -r ".[] | select(.id == $RUN_ID) | .status")
          if [ "$STATUS" != "completed" ]; then
            echo "Cancelling run $RUN_ID (status: $STATUS)..."
            gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/cancel" -X POST --silent || true
            CANCELLED=$((CANCELLED + 1))
          fi
        done

        echo "Cancelled $CANCELLED run(s)"

        if [ "$CANCELLED" -gt 0 ]; then
          echo "Waiting 30 seconds for cancellations to complete..."
          sleep 30
        fi

        # Delete all runs for this PR
        DELETED=0
        for RUN_ID in $(echo "$RUNS" | jq -r '.[].id'); do
          echo "Deleting run $RUN_ID..."
          gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID" -X DELETE --silent || true
          DELETED=$((DELETED + 1))
        done

        echo "Deleted $DELETED run(s)"
        echo "cancelled_count=$CANCELLED" >> $GITHUB_OUTPUT
